<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2048</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:Arial,sans-serif;color:#fff;padding:20px;overflow:hidden}
  h1{font-size:22px;margin-bottom:10px;background:linear-gradient(90deg,#ffd200,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:900;letter-spacing:2px}
  #info{display:flex;gap:28px;margin-bottom:16px}
  .score-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 22px;text-align:center}
  .score-box label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.35);display:block}
  .score-box span{font-size:22px;font-weight:800;color:#ffd200}
  #board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,140,0,0.2);border-radius:12px;padding:10px;width:min(100vw - 40px, 380px)}
  .tile{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-weight:800;font-size:clamp(14px,4vw,24px);background:rgba(255,255,255,0.06);transition:background 0.1s;border:1px solid rgba(255,255,255,0.06)}
  .controls{margin-top:14px;font-size:12px;color:rgba(255,255,255,0.25);text-align:center}
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
  .box{text-align:center;background:rgba(10,10,26,0.95);border:1px solid rgba(255,140,0,0.4);border-radius:14px;padding:30px 50px}
  .box h2{font-size:28px;margin-bottom:8px;background:linear-gradient(90deg,#ffd200,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .box p{color:rgba(255,255,255,0.45);margin-bottom:18px;font-size:13px}
  .box button{padding:11px 30px;background:linear-gradient(90deg,#ffd200,#ff8c00);border:none;border-radius:999px;font-weight:700;font-size:14px;color:#000;cursor:pointer}
</style>
</head>
<body>
<h1>2048</h1>
<div id="info">
  <div class="score-box"><label>Score</label><span id="score">0</span></div>
  <div class="score-box"><label>Best</label><span id="best">0</span></div>
</div>
<div id="board"></div>
<div class="controls">Arrow keys or swipe to move tiles · Merge same numbers!</div>

<div id="overlay">
  <div class="box">
    <h2>2048</h2>
    <p>Merge tiles with the same number.<br>Reach 2048 to win!</p>
    <button onclick="startGame()">Start Game</button>
  </div>
</div>

<script>
const COLORS={2:'#1a1a2e',4:'#16213e',8:'#0f3460',16:'#533483',32:'#e94560',64:'#ff4b4b',128:'#ffd200',256:'#ffb800',512:'#ff8c00',1024:'#ff5e00',2048:'#ff3c00'};
const TEXT={2:'rgba(255,255,255,0.5)',4:'rgba(255,255,255,0.6)',8:'#fff',16:'#fff',32:'#fff',64:'#fff',128:'#000',256:'#000',512:'#fff',1024:'#fff',2048:'#fff'};
let grid,score,best=0;

function startGame(){
  document.getElementById('overlay').style.display='none';
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0; updateScore();
  addTile(); addTile(); render();
}

function addTile(){
  const empty=[];
  grid.forEach((row,r)=>row.forEach((v,c)=>{ if(!v) empty.push([r,c]); }));
  if(!empty.length) return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  grid.forEach(row=>row.forEach(v=>{
    const d=document.createElement('div');
    d.className='tile';
    if(v){ d.textContent=v; d.style.background=COLORS[Math.min(v,2048)]||'#ff2200'; d.style.color=TEXT[Math.min(v,2048)]||'#fff'; d.style.boxShadow=v>=128?`0 0 20px ${COLORS[Math.min(v,2048)]}88`:''; }
    board.appendChild(d);
  }));
}

function updateScore(){ document.getElementById('score').textContent=score; if(score>best){best=score;document.getElementById('best').textContent=best;} }

function slide(row){
  let a=row.filter(v=>v), gained=0;
  for(let i=0;i<a.length-1;i++) if(a[i]===a[i+1]){a[i]*=2;gained+=a[i];a.splice(i+1,1);}
  score+=gained; updateScore();
  while(a.length<4) a.push(0);
  return a;
}

function move(dir){
  let moved=false;
  const orig=JSON.stringify(grid);
  if(dir==='left'||dir==='right'){
    grid=grid.map(row=>{ let r=dir==='right'?slide([...row].reverse()).reverse():slide([...row]); return r; });
  } else {
    for(let c=0;c<4;c++){
      let col=grid.map(r=>r[c]);
      col=dir==='down'?slide([...col].reverse()).reverse():slide([...col]);
      grid.forEach((r,i)=>r[c]=col[i]);
    }
  }
  if(JSON.stringify(grid)!==orig){ moved=true; addTile(); render(); }
  if(!moved) return;
  if(grid.some(row=>row.includes(2048))) return setTimeout(win,300);
  if(!canMove()) setTimeout(lose,300);
}

function canMove(){
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    if(!grid[r][c]) return true;
    if(c<3&&grid[r][c]===grid[r][c+1]) return true;
    if(r<3&&grid[r][c]===grid[r+1][c]) return true;
  }
  return false;
}

function reportScore(s){
  try{ window.parent.postMessage({type:'gpScore',gameId:'2048',score:s},'*'); }catch(e){}
}
function win(){
  reportScore(score);
  const ol=document.getElementById('overlay');
  ol.style.display='flex';
  ol.querySelector('.box').innerHTML=`<h2>🏆 You Won!</h2><p>You reached 2048! Score: <strong>${score}</strong></p><button onclick="startGame()">Play Again</button>`;
}
function lose(){
  reportScore(score);
  const ol=document.getElementById('overlay');
  ol.style.display='flex';
  ol.querySelector('.box').innerHTML=`<h2>💀 Game Over</h2><p>Score: <strong>${score}</strong></p><button onclick="startGame()">Try Again</button>`;
}

document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(map[e.key]){ move(map[e.key]); e.preventDefault(); }
});

let sx,sy;
document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
},{passive:true});
</script>
</body>
</html>
