<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Snake</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Arial,sans-serif;color:#fff;overflow:hidden}
  h1{font-size:22px;margin-bottom:10px;background:linear-gradient(90deg,#00d4ff,#4ecdc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  #info{display:flex;gap:30px;margin-bottom:12px;font-size:14px;color:rgba(255,255,255,0.5)}
  #info span{color:#00d4ff;font-weight:700}
  canvas{border:1px solid rgba(0,212,255,0.3);border-radius:8px;box-shadow:0 0 30px rgba(0,212,255,0.15)}
  #msg{position:absolute;text-align:center;background:rgba(0,0,0,0.85);padding:24px 40px;border-radius:12px;border:1px solid rgba(0,212,255,0.3);backdrop-filter:blur(10px)}
  #msg h2{font-size:26px;margin-bottom:6px}
  #msg p{color:rgba(255,255,255,0.5);margin-bottom:16px;font-size:13px}
  #msg button{padding:10px 28px;background:linear-gradient(90deg,#00d4ff,#4ecdc4);border:none;border-radius:999px;font-weight:700;font-size:14px;color:#000;cursor:pointer}
  .controls{margin-top:12px;font-size:12px;color:rgba(255,255,255,0.3)}
</style>
</head>
<body>
<h1>🐍 Snake</h1>
<div id="info">Score: <span id="score">0</span> &nbsp;|&nbsp; High: <span id="hi">0</span></div>
<canvas id="c"></canvas>
<div class="controls">Arrow keys or WASD to move · P to pause</div>

<div id="msg">
  <h2>🐍 Snake</h2>
  <p>Use arrow keys or WASD to control the snake.<br>Eat the food. Don't hit the walls!</p>
  <button onclick="startGame()">Start Game</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const msg    = document.getElementById('msg');
const scoreEl= document.getElementById('score');
const hiEl   = document.getElementById('hi');

const CELL = 20, COLS = 25, ROWS = 22;
canvas.width  = CELL * COLS;
canvas.height = CELL * ROWS;

let snake, dir, nextDir, food, score, hi=0, raf, paused=false;

function startGame(){
  msg.style.display='none';
  snake=[{x:12,y:11},{x:11,y:11},{x:10,y:11}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; scoreEl.textContent=0;
  placeFood(); paused=false;
  cancelAnimationFrame(raf);
  loop();
}

function placeFood(){
  let f;
  do { f={x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while(snake.some(s=>s.x===f.x&&s.y===f.y));
  food=f;
}

let last=0, speed=140;
function loop(ts=0){
  raf=requestAnimationFrame(loop);
  if(paused) return;
  if(ts-last<speed) return;
  last=ts;
  dir=nextDir;
  const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    return gameOver();
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++; scoreEl.textContent=score;
    if(score>hi){ hi=score; hiEl.textContent=hi; }
    speed=Math.max(60,140-score*4);
    placeFood();
  } else { snake.pop(); }
  draw();
}

function draw(){
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid dots
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) ctx.fillRect(x*CELL+9,y*CELL+9,2,2);
  // food
  const fx=food.x*CELL, fy=food.y*CELL;
  ctx.fillStyle='#ff4b4b';
  ctx.shadowColor='#ff4b4b'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.arc(fx+CELL/2,fy+CELL/2,CELL/2-3,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  // snake
  snake.forEach((s,i)=>{
    const pct=i/snake.length;
    ctx.fillStyle=i===0?'#00d4ff':`hsl(${180+pct*40},100%,${60-pct*20}%)`;
    if(i===0){ctx.shadowColor='#00d4ff';ctx.shadowBlur=16;}else{ctx.shadowBlur=4;ctx.shadowColor='#4ecdc4';}
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+2,s.y*CELL+2,CELL-4,CELL-4,i===0?6:4);
    ctx.fill();
  });
  ctx.shadowBlur=0;
}

function reportScore(s){
  try{ window.parent.postMessage({type:'gpScore',gameId:'snake',score:s},'*'); }catch(e){}
}
function gameOver(){
  cancelAnimationFrame(raf);
  reportScore(score);
  msg.innerHTML=`<h2>💀 Game Over</h2><p>Score: <strong>${score}</strong></p><button onclick="startGame()">Play Again</button>`;
  msg.style.display='block';
}

document.addEventListener('keydown',e=>{
  if(e.key==='p'||e.key==='P'){ paused=!paused; return; }
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
             w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},
             W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}};
  const n=map[e.key];
  if(n&&!(n.x===-dir.x&&n.y===-dir.y)){ nextDir=n; e.preventDefault(); }
});

// Touch swipe support
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){
    nextDir=dx>0?{x:1,y:0}:{x:-1,y:0};
  } else { nextDir=dy>0?{x:0,y:1}:{x:0,y:-1}; }
},{passive:true});
</script>
</body>
</html>
