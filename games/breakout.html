<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Breakout</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Arial,sans-serif;color:#fff;overflow:hidden}
  h1{font-size:20px;margin-bottom:8px;background:linear-gradient(90deg,#ff4b4b,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  #info{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:10px}
  #info span{color:#ff4b4b;font-weight:700}
  canvas{border:1px solid rgba(255,75,75,0.3);border-radius:8px;box-shadow:0 0 30px rgba(255,75,75,0.12)}
  .hint{font-size:11px;color:rgba(255,255,255,0.25);margin-top:8px}
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
  .box{text-align:center;background:rgba(10,10,26,0.95);border:1px solid rgba(255,75,75,0.4);border-radius:14px;padding:28px 44px}
  .box h2{font-size:26px;margin-bottom:8px;background:linear-gradient(90deg,#ff4b4b,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .box p{color:rgba(255,255,255,0.45);margin-bottom:18px;font-size:13px}
  .box button{padding:11px 30px;background:linear-gradient(90deg,#ff4b4b,#ff8c00);border:none;border-radius:999px;font-weight:700;font-size:14px;color:#fff;cursor:pointer}
</style>
</head>
<body>
<h1>🧱 Breakout</h1>
<div id="info">Score: <span id="score">0</span> &nbsp;|&nbsp; Lives: <span id="lives">3</span></div>
<canvas id="c"></canvas>
<div class="hint">← → Arrow keys or mouse to move paddle</div>
<div id="overlay">
  <div class="box">
    <h2>🧱 Breakout</h2>
    <p>Break all the bricks with the ball.<br>Don't let it fall!</p>
    <button onclick="startGame()">Start Game</button>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=canvas.width=480, H=canvas.height=400;

const ROWS=6, COLS=10, BW=40, BH=18, BPAD=4;
const PAD_W=80, PAD_H=10, B_R=7;
const COLORS=['#ff4b4b','#ff6b3d','#ff8c00','#ffd200','#00d4ff','#a64eff'];

let paddle,ball,bricks,score,lives,raf,running=false;

function startGame(){
  document.getElementById('overlay').style.display='none';
  score=0; lives=3;
  paddle={x:W/2-PAD_W/2,y:H-30,w:PAD_W};
  ball={x:W/2,y:H-50,vx:3,vy:-4,r:B_R};
  bricks=[];
  const totalW=COLS*(BW+BPAD)-BPAD, offX=(W-totalW)/2;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
    bricks.push({x:offX+c*(BW+BPAD),y:50+r*(BH+BPAD),alive:true,color:COLORS[r]});
  updateUI(); running=true;
  cancelAnimationFrame(raf); loop();
}

function updateUI(){ document.getElementById('score').textContent=score; document.getElementById('lives').textContent=lives; }

function loop(){
  raf=requestAnimationFrame(loop);
  if(!running) return;
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,H);
  // grid
  ctx.fillStyle='rgba(255,255,255,0.03)';
  for(let x=0;x<W;x+=20) for(let y=0;y<H;y+=20) ctx.fillRect(x+9,y+9,2,2);
  // bricks
  bricks.forEach(b=>{
    if(!b.alive) return;
    ctx.fillStyle=b.color; ctx.shadowColor=b.color; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.roundRect(b.x,b.y,BW,BH,4); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.fillRect(b.x+3,b.y+3,BW-6,3);
  });
  // paddle
  ctx.fillStyle='#00d4ff'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.roundRect(paddle.x,paddle.y,paddle.w,PAD_H,5); ctx.fill();
  ctx.shadowBlur=0;
  // ball
  ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=16;
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  // physics
  ball.x+=ball.vx; ball.y+=ball.vy;
  if(ball.x-ball.r<=0||ball.x+ball.r>=W) ball.vx*=-1;
  if(ball.y-ball.r<=0) ball.vy*=-1;
  // paddle hit
  if(ball.y+ball.r>=paddle.y&&ball.y+ball.r<=paddle.y+PAD_H&&ball.x>=paddle.x&&ball.x<=paddle.x+paddle.w){
    ball.vy=-Math.abs(ball.vy);
    ball.vx=((ball.x-(paddle.x+paddle.w/2))/(paddle.w/2))*5;
  }
  // brick hit
  bricks.forEach(b=>{
    if(!b.alive) return;
    if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+BW&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+BH){
      b.alive=false; ball.vy*=-1; score+=10; updateUI();
    }
  });
  // lost ball
  if(ball.y>H){ lives--; updateUI(); if(lives<=0){ running=false; showEnd(false); return; } ball={x:W/2,y:H-50,vx:3,vy:-4,r:B_R}; }
  // won
  if(bricks.every(b=>!b.alive)){ running=false; showEnd(true); }
}

function reportScore(s){
  try{ window.parent.postMessage({type:'gpScore',gameId:'breakout',score:s},'*'); }catch(e){}
}
function showEnd(won){
  reportScore(score);
  const ol=document.getElementById('overlay'); ol.style.display='flex';
  ol.querySelector('.box').innerHTML=`<h2>${won?'🏆 You Win!':'💀 Game Over'}</h2><p>Score: <strong>${score}</strong></p><button onclick="startGame()">Play Again</button>`;
}

// Controls
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'&&paddle.x>0) paddle.x=Math.max(0,paddle.x-18);
  if(e.key==='ArrowRight'&&paddle.x+paddle.w<W) paddle.x=Math.min(W-paddle.w,paddle.x+18);
});
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  paddle.x=Math.min(W-paddle.w,Math.max(0,e.clientX-rect.left-paddle.w/2));
});
canvas.addEventListener('touchmove',e=>{
  const rect=canvas.getBoundingClientRect();
  paddle.x=Math.min(W-paddle.w,Math.max(0,e.touches[0].clientX-rect.left-paddle.w/2));
  e.preventDefault();
},{passive:false});
</script>
</body>
</html>
