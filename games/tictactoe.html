<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tic-Tac-Toe</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:Arial,sans-serif;color:#fff;padding:20px}
  h1{font-size:22px;margin-bottom:6px;background:linear-gradient(90deg,#4ecdc4,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  #status{font-size:15px;color:rgba(255,255,255,0.5);margin-bottom:20px;min-height:22px;text-align:center}
  #status strong{color:#00d4ff}
  #scores{display:flex;gap:20px;margin-bottom:20px}
  .sbox{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 24px;text-align:center}
  .sbox label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.3);display:block;margin-bottom:4px}
  .sbox.x-color{border-color:rgba(0,212,255,0.3)} .sbox.x-color span{color:#00d4ff}
  .sbox.o-color{border-color:rgba(255,107,107,0.3)} .sbox.o-color span{color:#ff6b6b}
  .sbox.d-color span{color:rgba(255,255,255,0.4)}
  .sbox span{font-size:28px;font-weight:800}
  #grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:min(90vw,320px)}
  .cell{aspect-ratio:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:900;cursor:pointer;transition:background 0.2s,border-color 0.2s,transform 0.15s}
  .cell:hover:empty{background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.3);transform:scale(1.04)}
  .cell.x{color:#00d4ff;text-shadow:0 0 20px rgba(0,212,255,0.6);animation:pop 0.2s ease}
  .cell.o{color:#ff6b6b;text-shadow:0 0 20px rgba(255,107,107,0.6);animation:pop 0.2s ease}
  .cell.win{background:rgba(0,212,255,0.12);border-color:rgba(0,212,255,0.5);animation:winPulse 0.5s ease}
  @keyframes pop{0%{transform:scale(0.6)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
  @keyframes winPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  #resetBtn{margin-top:24px;padding:10px 28px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:#00d4ff;font-weight:700;font-size:13px;border-radius:999px;cursor:pointer;transition:all 0.2s}
  #resetBtn:hover{background:rgba(0,212,255,0.2);border-color:#00d4ff}
</style>
</head>
<body>
<h1>✖️ Tic-Tac-Toe</h1>
<div id="scores">
  <div class="sbox x-color"><label>✕ Player 1</label><span id="xw">0</span></div>
  <div class="sbox d-color"><label>Draws</label><span id="dw">0</span></div>
  <div class="sbox o-color"><label>○ Player 2</label><span id="ow">0</span></div>
</div>
<div id="status"><strong>✕</strong>'s turn</div>
<div id="grid"></div>
<button id="resetBtn" onclick="resetRound()">New Round</button>

<script>
const LINES=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let board,turn,scores={X:0,O:0,D:0},done=false;

function initBoard(){
  board=Array(9).fill(''); turn='X'; done=false;
  document.getElementById('status').innerHTML=`<strong>✕</strong>'s turn`;
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  for(let i=0;i<9;i++){
    const c=document.createElement('div');
    c.className='cell'; c.dataset.i=i;
    c.addEventListener('click',()=>play(c,i));
    grid.appendChild(c);
  }
}

function reportScore(s){
  try{ window.parent.postMessage({type:'gpScore',gameId:'tictactoe',score:s},'*'); }catch(e){}
}
function play(el,i){
  if(board[i]||done) return;
  board[i]=turn;
  el.textContent=turn==='X'?'✕':'○';
  el.classList.add(turn.toLowerCase());
  const win=checkWin();
  if(win){ done=true; win.forEach(k=>document.querySelectorAll('.cell')[k].classList.add('win')); scores[turn]++; updateScores(); reportScore(scores[turn]); document.getElementById('status').innerHTML=`<strong>${turn==='X'?'✕':'○'} ${turn==='X'?'Player 1':'Player 2'}</strong> wins! 🎉`; return; }
  if(board.every(v=>v)){ done=true; scores.D++; updateScores(); document.getElementById('status').textContent="It's a draw!"; return; }
  turn=turn==='X'?'O':'X';
  document.getElementById('status').innerHTML=`<strong>${turn==='X'?'✕':'○'}</strong>'s turn`;
}

function checkWin(){
  for(const [a,b,c] of LINES) if(board[a]&&board[a]===board[b]&&board[a]===board[c]) return [a,b,c];
  return null;
}

function updateScores(){ document.getElementById('xw').textContent=scores.X; document.getElementById('ow').textContent=scores.O; document.getElementById('dw').textContent=scores.D; }
function resetRound(){ initBoard(); }

initBoard();
</script>
</body>
</html>
